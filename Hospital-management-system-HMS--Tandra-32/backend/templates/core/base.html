<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Hospital Management{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f8; color: #111; }
        header { background: #1f73b7; color: white; padding: 1rem 1.5rem; }
        nav a { color: white; text-decoration: none; margin-right: 1rem; }
        .container { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; box-shadow: 0 10px 24px rgba(15,23,42,.08); padding: 1.5rem; margin-bottom: 1.25rem; }
        .grid { display: grid; gap: 1rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .button, button { display: inline-flex; align-items: center; justify-content: center; background: #1f73b7; color: white; border: none; border-radius: 8px; padding: 0.85rem 1.2rem; text-decoration: none; cursor: pointer; }
        .button-outline { background: transparent; color: #1f73b7; border: 1px solid #1f73b7; }
        form input, form textarea { width: 100%; padding: 0.85rem; margin-bottom: 0.9rem; border-radius: 8px; border: 1px solid #d1d5db; }
        .small-text { color: #5b636f; font-size: 0.95rem; }
        .hero { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; }
        .hero h1 { margin: 0; font-size: 2rem; }
        .error { color: #b91c1c; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="container hero">
            <div>
                <h1>Hospital Management Backend</h1>
                <p class="small-text">Django + MongoDB local backend for doctor search, booking, and page navigation.</p>
            </div>
            <div>
                <nav>
                    <a href="/">Home</a>
                    <a href="/doctor-search/">Doctor Search</a>
                </nav>
            </div>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
